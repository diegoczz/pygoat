# .github/workflows/devsecops.yml
name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # JOB 1: Gitleaks - Buscar contraseñas en código
  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Para escanear TODO el historial
    
    - name: Ejecutar Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        config-path: .gitleaks.toml  # Opcional
        redact: true
        verbose: true

  # JOB 2: Snyk - Analizar dependencias
  snyk:
    runs-on: ubuntu-latest
    needs: gitleaks  # Espera a que gitleaks termine
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Ejecutar Snyk
      uses: snyk/actions/python@master
      continue-on-error: false  # Si falla, PARA TODO
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: test --severity-threshold=high --file=requirements.txt

  # JOB 3: SonarQube - Análisis estático
  sonarqube:
    runs-on: ubuntu-latest
    needs: snyk  # Espera a que snyk termine
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io

  # JOB 4: Construir Docker
  build:
    runs-on: ubuntu-latest
    needs: sonarqube
    if: always()  # Se ejecuta aunque fallen otros jobs
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        echo "🐳 Construyendo imagen Docker..."
        # Solo si existe Dockerfile
        if [ -f Dockerfile ]; then
          docker build -t pygoat:latest .
          echo "✅ Build completado"
        else
          echo "⚠️  No hay Dockerfile, saltando build"
        fi

  # JOB 5: Notificación final
  notify:
    runs-on: ubuntu-latest
    needs: [gitleaks, snyk, sonarqube, build]
    if: always()  # Siempre se ejecuta
    steps:
    - name: Mostrar resultado
      run: |
        echo "========================================"
        echo "📊 RESULTADO DEL PIPELINE DEVSECOPS"
        echo "========================================"
        echo ""
        
        # Aquí podríamos chequear el estado de cada job
        echo "🔍 Gitleaks: ${{ needs.gitleaks.result }}"
        echo "📦 Snyk: ${{ needs.snyk.result }}"
        echo "🔬 SonarQube: ${{ needs.sonarqube.result }}"
        echo "🐳 Build: ${{ needs.build.result }}"
        echo ""
        
        if [[ "${{ needs.gitleaks.result }}" == "success" && 
              "${{ needs.snyk.result }}" == "success" && 
              "${{ needs.sonarqube.result }}" == "success" ]]; then
          echo "✅✅✅ PIPELINE EXITOSO ✅✅✅"
          echo "PyGoat v1.x: Superadas pruebas de seguridad."
          echo "Listo para despliegue en Producción."
        else
          echo "❌❌❌ PIPELINE FALLIDO ❌❌❌"
          echo "Revisa los jobs anteriores para ver los errores."
        fi
